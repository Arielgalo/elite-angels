<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desbloqueo · Aura Experience</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/styles.css?v=5">
<style>
  .dq-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 16px; gap: 22px; }
  .dq-card { width: 100%; max-width: 520px; text-align: center; }
  .dqhead { font-size: 2.6rem; margin-bottom: 6px; }
  .dq-card h2 { font-family: var(--serif); font-size: 1.9rem; margin-bottom: 12px; color: var(--gold-bright); }
  .dq-card p { color: var(--text-soft); font-size: .96rem; margin-bottom: 14px; }
  .dq-card .muted { color: var(--text-mute); font-size: .82rem; }
  .dqgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 16px 0; }
  .dqgrid img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); }
  .dq-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .dq-logo img { width: 40px; height: 40px; }
  .dq-logo span { font-family: var(--serif); font-size: 1.4rem; color: var(--text); letter-spacing: .04em; }
</style>
</head>
<body>
<div class="dq-wrap">
  <a class="dq-logo" href="index.html"><img src="assets/logo.svg" alt="Aura Experience"><span>Aura <em style="color:var(--gold);font-style:normal">Experience</em></span></a>
  <div class="form-card dq-card" id="dqBox">
    <div class="dqhead">⏳</div><h2>Cargando…</h2><p>Un momento.</p>
  </div>
  <a href="index.html" style="color:var(--text-mute);font-size:.85rem;text-decoration:none">← Volver al inicio</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="js/ea-supabase.js?v=7" defer></script>
<script defer>
document.addEventListener('DOMContentLoaded', () => {
  const box = document.getElementById('dqBox');
  const t = new URLSearchParams(location.search).get('t');
  const money = (n) => '$' + (Number(n) || 10000).toLocaleString('es-AR');
  if (!t) { box.innerHTML = '<div class="dqhead">⚠️</div><h2>Link inválido</h2><p>Falta el código de tu solicitud.</p>'; return; }
  if (!window.eaSupa) { box.innerHTML = '<div class="dqhead">⚠️</div><h2>Error de carga</h2><p>Recargá la página.</p>'; return; }

  async function refresh() {
    let d;
    try { d = await window.eaSupa.verDesbloqueo(t); }
    catch (e) { box.innerHTML = '<div class="dqhead">⚠️</div><h2>No pudimos cargar tu solicitud</h2><p>Probá recargar en un momento.</p>'; return; }
    if (!d || d.error) { box.innerHTML = '<div class="dqhead">⚠️</div><h2>Solicitud no encontrada</h2><p>' + ((d && d.error) || 'Verificá tu link.') + '</p>'; return; }
    const nombre = d.nombre ? ('<strong>' + d.nombre + '</strong>') : 'el perfil';

    if (d.estado === 'solicitado') {
      box.innerHTML = '<div class="dqhead">⏳</div><h2>Solicitud enviada</h2><p>Le pediste a ' + nombre + ' desbloquear sus fotos privadas. Cuando apruebe, vas a poder pagar ' + money(d.monto) + ' y verlas acá mismo.</p><p class="muted">Esta página se actualiza sola. Guardá este link para volver.</p>';
      setTimeout(refresh, 6000);
    } else if (d.estado === 'aprobado') {
      box.innerHTML = '<div class="dqhead">✅</div><h2>¡Aprobada!</h2><p>' + nombre + ' aceptó tu solicitud. Pagá ' + money(d.monto) + ' para desbloquear sus fotos privadas.</p><button class="btn btn-gold" id="dqPay" style="justify-content:center">Pagar ' + money(d.monto) + ' y ver</button><div id="pm" class="muted" style="margin-top:10px"></div>';
      document.getElementById('dqPay').addEventListener('click', async () => {
        const b = document.getElementById('dqPay'); b.textContent = 'Redirigiendo…'; b.disabled = true;
        try { await window.eaSupa.crearPagoDesbloqueo(t); }
        catch (e) { document.getElementById('pm').textContent = (e.message || 'No se pudo iniciar el pago.'); b.disabled = false; b.textContent = 'Reintentar'; }
      });
    } else if (d.estado === 'pagado') {
      const fotos = d.fotos || [];
      box.innerHTML = '<div class="dqhead">🔓</div><h2>Fotos desbloqueadas</h2><p>' + (d.nombre ? d.nombre + ' te' : 'Te') + ' habilitó sus fotos privadas.</p><div class="dqgrid">' + (fotos.length ? fotos.map(f => '<a href="' + f + '" target="_blank" rel="noopener"><img src="' + f + '" loading="lazy"></a>').join('') : '<p>El perfil todavía no cargó fotos privadas.</p>') + '</div><p class="muted">Acceso privado y personal. No compartas este link.</p>';
    } else if (d.estado === 'rechazado') {
      box.innerHTML = '<div class="dqhead">🚫</div><h2>Solicitud no aceptada</h2><p>El perfil decidió no aprobar esta solicitud. No se te cobró nada.</p>';
    } else {
      box.innerHTML = '<div class="dqhead">•</div><h2>Estado: ' + d.estado + '</h2>';
    }
  }
  refresh();
  // al volver del pago, el webhook tarda unos segundos en confirmar
  if (new URLSearchParams(location.search).get('pd') === 'ok') {
    let n = 0; const iv = setInterval(async () => { n++; await refresh(); if (n >= 8) clearInterval(iv); }, 4000);
  }
});
</script>
</body>
</html>
