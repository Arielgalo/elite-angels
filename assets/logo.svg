<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e6b8"/>
      <stop offset="0.45" stop-color="#e3c87f"/>
      <stop offset="1" stop-color="#b8924d"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#4a1320"/>
      <stop offset="1" stop-color="#1a0710"/>
    </radialGradient>
  </defs>

  <!-- Corona -->
  <g fill="url(#g)">
    <path d="M100 18l10 16 16-12-4 22h-44l-4-22 16 12z"/>
    <circle cx="70" cy="34" r="3.4"/>
    <circle cx="100" cy="20" r="3.8"/>
    <circle cx="130" cy="34" r="3.4"/>
    <rect x="74" y="46" width="52" height="5" rx="2.5"/>
  </g>

  <!-- Anillo exterior -->
  <circle cx="100" cy="112" r="56" fill="none" stroke="url(#g)" stroke-width="6"/>
  <!-- Disco interior -->
  <circle cx="100" cy="112" r="46" fill="url(#bg)" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Letra E -->
  <text x="100" y="112" text-anchor="middle" dominant-baseline="central"
        font-family="Cormorant Garamond, Georgia, serif" font-weight="600"
        font-size="62" fill="url(#g)">E</text>

  <!-- Estrellas -->
  <g fill="url(#g)">
    <path d="M86 148l1.6 3.4 3.6.4-2.7 2.5.8 3.6-3.3-1.9-3.3 1.9.8-3.6-2.7-2.5 3.6-.4z" transform="scale(.5) translate(86 150)"/>
  </g>

  <!-- Laurel izquierdo -->
  <g fill="url(#g)">
    <path d="M58 96c-10 8-14 22-10 36 6-3 11-9 12-17-5 3-8 8-8 8s2-9 6-14c-2 4-2 9-2 9s4-12 12-18c-8 1-14 6-14 6s4-9 12-12c-7-1-12 2-12 2s5-6 12-7z"/>
    <ellipse cx="56" cy="108" rx="4" ry="8" transform="rotate(35 56 108)"/>
    <ellipse cx="54" cy="122" rx="4" ry="8" transform="rotate(20 54 122)"/>
    <ellipse cx="56" cy="136" rx="4" ry="8" transform="rotate(5 56 136)"/>
  </g>
  <!-- Laurel derecho (espejo) -->
  <g fill="url(#g)" transform="translate(200 0) scale(-1 1)">
    <path d="M58 96c-10 8-14 22-10 36 6-3 11-9 12-17-5 3-8 8-8 8s2-9 6-14c-2 4-2 9-2 9s4-12 12-18c-8 1-14 6-14 6s4-9 12-12c-7-1-12 2-12 2s5-6 12-7z"/>
    <ellipse cx="56" cy="108" rx="4" ry="8" transform="rotate(35 56 108)"/>
    <ellipse cx="54" cy="122" rx="4" ry="8" transform="rotate(20 54 122)"/>
    <ellipse cx="56" cy="136" rx="4" ry="8" transform="rotate(5 56 136)"/>
  </g>

  <!-- Voluta inferior -->
  <g fill="url(#g)">
    <path d="M76 168c-6 4-14 4-20 0 4 6 14 7 20 2zm48 0c6 4 14 4 20 0-4 6-14 7-20 2z"/>
    <path d="M100 170l2.4 5 5 .6-3.7 3.5 1 5-4.7-2.6-4.7 2.6 1-5-3.7-3.5 5-.6z"/>
  </g>
</svg>
