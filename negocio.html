<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>if(location.hostname.indexOf("netlify.app")>-1)location.replace("https://auraexperience.com.ar"+location.pathname+location.search+location.hash);</script>
<title>Espacio comercial · Aura Experience</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/styles.css?v=7">
<style>
.ng-wrap{max-width:920px;margin:0 auto;padding:26px 18px 90px}
.ng-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}
.ng-top a.logo{display:inline-flex;flex-direction:column;line-height:.86;text-decoration:none}
.ng-top a.logo span{font-family:var(--serif);font-size:1.25rem;color:var(--text);letter-spacing:.08em}
.ng-back{color:var(--text-mute);font-size:.88rem;text-decoration:none}
.ng-hero{display:flex;gap:20px;align-items:center;flex-wrap:wrap;border:1px solid var(--gold);border-radius:20px;padding:24px;background:linear-gradient(120deg,rgba(212,175,110,.10),rgba(212,175,110,.02))}
.ng-logo{width:96px;height:96px;border-radius:18px;object-fit:cover;flex-shrink:0;border:1px solid var(--line)}
.ng-logo.ph{display:flex;align-items:center;justify-content:center;font-size:44px;background:rgba(212,175,110,.14)}
.ng-hero h1{font-size:2rem;line-height:1.1;margin-bottom:6px}
.ng-rubro{display:inline-block;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:3px 12px;margin-bottom:8px}
.ng-owner{color:var(--text-mute);font-size:.85rem;margin-top:6px}
.ng-sec{margin-top:30px}
.ng-sec h2{font-size:1.15rem;letter-spacing:.02em;margin-bottom:14px;color:var(--gold);display:flex;align-items:center;gap:8px}
.ng-desc{color:var(--text-soft);line-height:1.7;font-size:1.02rem}
.ng-promo{background:linear-gradient(90deg,rgba(245,158,11,.16),rgba(244,63,94,.12));border:1px solid rgba(245,158,11,.4);border-radius:14px;padding:14px 18px;color:var(--gold-bright);font-weight:600;font-size:1.05rem;margin-top:14px}
.ng-list .it{color:var(--text-soft);font-size:.98rem;line-height:1.55;padding-left:18px;position:relative;margin-bottom:8px}
.ng-list .it:before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.ng-gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ng-gal a{display:block;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.ng-gal img{width:100%;height:100%;object-fit:cover;transition:.3s}
.ng-gal a:hover img{transform:scale(1.05)}
.ng-map{width:100%;height:320px;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:6px}
.ng-map iframe{width:100%;height:100%;border:0;filter:grayscale(.2) contrast(1.05)}
.ng-addr{color:var(--text-soft);margin-bottom:10px}
.ng-press a{display:flex;align-items:center;gap:10px;color:var(--text-soft);text-decoration:none;padding:11px 14px;border:1px solid var(--line-soft);border-radius:12px;margin-bottom:8px;transition:.2s}
.ng-press a:hover{border-color:var(--gold);color:var(--text)}
.ng-cta{position:sticky;bottom:14px;display:flex;gap:10px;flex-wrap:wrap;margin-top:34px}
.ng-cta .btn{flex:1;min-width:180px;justify-content:center}
.ng-muted{color:var(--text-mute);font-size:.85rem}
</style>
</head>
<body>
<div class="ng-wrap">
  <div class="ng-top">
    <a class="logo" href="index.html"><span>Aura</span><span style="color:var(--gold)">Experience</span></a>
    <a class="ng-back" id="back" href="index.html">← Volver</a>
  </div>
  <div id="ng"><p style="color:var(--text-mute);padding:40px 0">Cargando espacio comercial…</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var URL='https://fsjrimmurtnrorqhnbwu.supabase.co', KEY='sb_publishable_2lWllWfVLWsPnnko4TEa4Q_2sx0kdI4';
  var sid=new URLSearchParams(location.search).get('sid');
  var esc=function(x){return (x==null?'':String(x)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var el=document.getElementById('ng');
  function lines(v){ return v? String(v).split(/\n/).map(function(t){return t.trim();}).filter(Boolean):[]; }
  function waLink(t){ var d=String(t||'').replace(/[^0-9]/g,''); if(d.length===10) d='54'+d; else if(d.length===11&&d[0]==='9') d='54'+d; return 'https://wa.me/'+d; }
  function webUrl(w){ if(!w) return ''; if(/^https?:/.test(w)) return w; if(w.charAt(0)==='@') return 'https://instagram.com/'+w.slice(1); return 'https://'+w; }
  if(!sid){ el.innerHTML='<p class="ng-muted" style="padding:40px 0">Falta el perfil (?sid=).</p>'; return; }
  document.getElementById('back').setAttribute('href','perfil.html?sid='+sid);
  var sb=window.supabase.createClient(URL,KEY);
  sb.from('perfiles_publicados').select('*').eq('id',sid).maybeSingle().then(function(r){
    if(r.error||!r.data){ el.innerHTML='<p class="ng-muted" style="padding:40px 0">No se encontró el espacio.</p>'; return; }
    var p=r.data;
    if(!(p.negocio_nombre||p.negocio||p.negocio_servicios||p.negocio_direccion)){ el.innerHTML='<p class="ng-muted" style="padding:40px 0">Este perfil todavía no cargó su espacio comercial.</p>'; return; }
    document.title=(p.negocio_nombre||'Espacio comercial')+' · Aura';
    var logo=p.negocio_logo? '<img class="ng-logo" src="'+esc(p.negocio_logo)+'" alt="">' : '<div class="ng-logo ph">💼</div>';
    var hero='<div class="ng-hero">'+logo+'<div style="flex:1;min-width:200px">'+(p.negocio_rubro?'<span class="ng-rubro">'+esc(p.negocio_rubro)+'</span><br>':'')+'<h1>'+esc(p.negocio_nombre||'Mi negocio')+'</h1>'+(p.negocio?'<div class="ng-desc">'+esc(p.negocio)+'</div>':'')+'<div class="ng-owner">Por '+esc(p.nombre||'')+(p.zona||p.negocio_zona?' · '+esc(p.negocio_zona||''):'')+'</div></div></div>';

    var out=hero;
    // Promos y descuentos
    var descs=lines(p.negocio_descuentos);
    if(p.negocio_promo||descs.length){
      out+='<div class="ng-sec"><h2>🎁 Descuentos y promociones</h2>'+(p.negocio_promo?'<div class="ng-promo">'+esc(p.negocio_promo)+'</div>':'')+(descs.length?'<div class="ng-list" style="margin-top:12px">'+descs.map(function(d){return '<div class="it">'+esc(d)+'</div>';}).join('')+'</div>':'')+'</div>';
    }
    // Servicios
    var servs=lines(p.negocio_servicios);
    if(servs.length){ out+='<div class="ng-sec"><h2>🛠️ Servicios y productos</h2><div class="ng-list">'+servs.map(function(x){return '<div class="it">'+esc(x)+'</div>';}).join('')+'</div></div>'; }
    // Galeria
    var fotos=Array.isArray(p.negocio_fotos)?p.negocio_fotos:[];
    if(fotos.length){ out+='<div class="ng-sec"><h2>📸 Fotos</h2><div class="ng-gal">'+fotos.map(function(u){return '<a href="'+esc(u)+'" target="_blank" rel="noopener"><img src="'+esc(u)+'" loading="lazy"></a>';}).join('')+'</div></div>'; }
    // Ubicacion + mapa
    if(p.negocio_direccion||p.negocio_mapa){
      var q=encodeURIComponent(p.negocio_direccion||'');
      out+='<div class="ng-sec"><h2>📍 Ubicación</h2>'+(p.negocio_direccion?'<div class="ng-addr">'+esc(p.negocio_direccion)+'</div>':'')+(p.negocio_direccion?'<div class="ng-map"><iframe loading="lazy" src="https://maps.google.com/maps?q='+q+'&z=15&output=embed"></iframe></div>':'')+(p.negocio_mapa?'<a href="'+esc(p.negocio_mapa)+'" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;display:inline-block;margin-top:10px">🗺️ Abrir en Google Maps</a>':'')+'</div>';
    }
    // Prensa
    var press=lines(p.negocio_prensa);
    if(press.length){ out+='<div class="ng-sec"><h2>📰 En la prensa</h2><div class="ng-press">'+press.map(function(l){ var mu=l.match(/https?:\/\/\S+/); var url=mu?mu[0]:''; var title=l.replace(/\s*[—-]\s*https?:\/\/\S+/,'').replace(/https?:\/\/\S+/,'').trim()||url; return url?'<a href="'+esc(url)+'" target="_blank" rel="noopener">🔗 '+esc(title)+'</a>':'<span class="it" style="display:block">'+esc(l)+'</span>'; }).join('')+'</div></div>'; }
    // Contacto (sticky)
    var cta='';
    if(p.negocio_contacto) cta+='<a class="btn btn-wa" href="'+waLink(p.negocio_contacto)+'" target="_blank">💬 Contactar por WhatsApp</a>';
    var wu=webUrl(p.negocio_web); if(wu) cta+='<a class="btn btn-ghost" href="'+esc(wu)+'" target="_blank">🔗 '+esc(p.negocio_web)+'</a>';
    if(cta) out+='<div class="ng-cta">'+cta+'</div>';

    el.innerHTML=out;
  });
})();
</script>
</body>
</html>
