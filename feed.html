<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>if(location.hostname.indexOf("netlify.app")>-1)location.replace("https://auraexperience.com.ar"+location.pathname+location.search+location.hash);</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Feed · Aura Experience</title>
<meta name="description" content="Descubrí perfiles reales en video: presencia humana a demanda.">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0c">
<link rel="canonical" href="https://auraexperience.com.ar/feed.html">
<meta property="og:url" content="https://auraexperience.com.ar/feed.html">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;background:#0a0a0c;font-family:'Helvetica Neue',Helvetica,Arial,'Inter',sans-serif;overscroll-behavior:none;}
  #root{height:100dvh;}
  .no-sb::-webkit-scrollbar{display:none;}
  .no-sb{-ms-overflow-style:none;scrollbar-width:none;}
  @keyframes auraspin{to{transform:rotate(360deg)}}
  @keyframes kb{0%{transform:scale(1)}100%{transform:scale(1.12)}}
  @keyframes eq{0%,100%{height:20%}50%{height:100%}}
  @keyframes pulseSound{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes upsheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes modepop{0%{transform:translate(-50%,-4px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef } = React;
const sb = window.supabase.createClient('https://fsjrimmurtnrorqhnbwu.supabase.co','sb_publishable_2lWllWfVLWsPnnko4TEa4Q_2sx0kdI4');
const AURAS=[['#f59e0b','#f43f5e','#a855f7'],['#22d3ee','#3b82f6','#8b5cf6'],['#34d399','#10b981','#f59e0b'],['#e879f9','#d946ef','#f43f5e'],['#fbbf24','#f97316','#ef4444'],['#60a5fa','#818cf8','#c084fc']];
const ROLES={citas:'Citas & Compañía',amigos:'Amigos & Salidas',eventos:'Eventos, Roles & Presencia'};
const MODES=[{k:'video',label:'Video',big:'🎬 Solo videos'},{k:'mixto',label:'Mixto',big:'✨ Video + Foto'},{k:'foto',label:'Foto',big:'📸 Solo fotos'}];
const keyOf=(sid,url)=>sid+'|'+(url||'');
function Ico(props){return React.createElement('svg',{width:props.size||27,height:props.size||27,viewBox:'0 0 24 24',fill:props.fill||'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('path',{d:props.d}));}
const HEART="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z";
const CHAT="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6A8.4 8.4 0 1 1 21 11.5z";
const SHARE="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7 M16 6l-4-4-4 4 M12 2v13";
const SPK_ON="M11 5 6 9H2v6h4l5 4V5z M15.5 8.5a5 5 0 0 1 0 7 M19 5a9 9 0 0 1 0 14";
const SPK_OFF="M11 5 6 9H2v6h4l5 4V5z M22 9l-6 6 M16 9l6 6";

function Eq(props){ return <div className="flex items-end gap-0.5 h-3.5">{[0,1,2,3].map(i=><span key={i} className="w-0.5 rounded-full" style={{background:props.color,height:'100%',animation:'eq '+(0.6+i*0.12)+'s ease-in-out '+(i*0.1)+'s infinite'}}/>)}</div>; }
function AuraRing(props){ const c=props.colors; return <div className="relative shrink-0" style={{width:props.size,height:props.size}}><div className="absolute rounded-full" style={{inset:0,background:'conic-gradient(from 0deg, '+c[0]+', '+c[1]+', '+c[2]+', '+c[0]+')',animation:'auraspin '+(props.active?3.5:9)+'s linear infinite',boxShadow:props.active?('0 0 20px 3px '+c[1]+'99'):'none'}}/><div className="absolute rounded-full overflow-hidden bg-neutral-900" style={{inset:3}}>{c.img?<img src={c.img} className="w-full h-full object-cover" alt=""/>:<div className="w-full h-full" style={{background:'radial-gradient(circle at 30% 25%, '+c[0]+'66, transparent 60%)'}}/>}</div></div>; }

function Card(props){
  const p=props.p, aura=props.aura, soundOn=props.soundOn, setSoundOn=props.setSoundOn;
  const ref=useRef(null), vidRef=useRef(null);
  const [active,setActive]=useState(false); const [paused,setPaused]=useState(false); const [liked,setLiked]=useState(false);
  useEffect(()=>{ const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(function(ent){ const e=ent[0]; const vis=e.intersectionRatio>0.6; setActive(vis); const v=vidRef.current; if(v){ if(vis){ v.muted=!soundOn; v.volume=1; v.play().then(function(){setPaused(false);}).catch(function(){}); } else { v.pause(); v.muted=true; } } },{threshold:[0,0.6,1]});
    io.observe(el); return function(){io.disconnect();};
  },[soundOn]);
  useEffect(()=>{ const v=vidRef.current; if(v&&active){ v.muted=!soundOn; v.volume=1; } },[soundOn,active]);
  function toggleSound(e){ if(e) e.stopPropagation(); const ns=!soundOn; setSoundOn(ns); const v=vidRef.current; if(v){ v.muted=!ns; v.volume=1; if(ns){ v.play().then(function(){setPaused(false);}).catch(function(){}); } } }
  function onMediaTap(){ if(!soundOn && p.video){ toggleSound(); return; } const v=vidRef.current; if(!v) return; if(v.paused){ v.play(); setPaused(false); } else { v.pause(); setPaused(true); } }
  const avatarColors=Object.assign([aura[0],aura[1],aura[2]],{img:p.foto}); const hasVideo=!!p.video;
  return <section ref={ref} className="relative h-full w-full shrink-0 snap-start snap-always overflow-hidden bg-neutral-950" onClick={onMediaTap}>
    {hasVideo?<video ref={vidRef} src={p.video} poster={p.foto||undefined} loop muted playsInline preload="auto" className="absolute inset-0 w-full h-full object-cover"/>:(p.foto?<img src={p.foto} alt={p.name} className="absolute inset-0 w-full h-full object-cover" style={{animation:active?'kb 12s ease-out forwards':'none'}}/>:<div className="absolute inset-0" style={{background:'linear-gradient(160deg, '+aura[0]+'33, #0a0a0c 70%)'}}/>) }
    <div className="absolute inset-0" style={{background:'linear-gradient(to top, rgba(0,0,0,.82) 4%, rgba(0,0,0,0) 42%, rgba(0,0,0,.25))'}}/>
    {hasVideo && paused && <div className="absolute inset-0 flex items-center justify-center pointer-events-none"><span className="w-16 h-16 rounded-full bg-black/40 backdrop-blur flex items-center justify-center text-white"><Ico d="M8 5v14l11-7z" fill="#fff" size={30}/></span></div>}
    {hasVideo && active && !soundOn && <button onClick={toggleSound} className="absolute top-24 left-1/2 -translate-x-1/2 z-20 flex items-center gap-2 px-4 py-2 rounded-full text-neutral-950 text-[13px] font-semibold" style={{background:'linear-gradient(90deg,#f59e0b,#f43f5e)',animation:'pulseSound 1.6s ease-in-out infinite'}}><Ico d={SPK_OFF} size={18}/> Tocá para activar el sonido</button>}
    <div className="absolute right-2.5 bottom-32 flex flex-col items-center gap-5 z-10 text-white">
      <div className="relative flex flex-col items-center"><AuraRing colors={avatarColors} size={54} active={active}/><span className="w-5 h-5 -mt-2 rounded-full flex items-center justify-center text-neutral-950 text-sm font-bold" style={{background:aura[1]}}>+</span></div>
      <button onClick={function(e){e.stopPropagation();setLiked(function(v){return !v;});}} className="flex flex-col items-center gap-1" style={{color:liked?'#f43f5e':'#fff'}}><Ico d={HEART} fill={liked?'#f43f5e':'none'}/><span className="text-[11px] font-semibold">{(p.puntos||0)+(liked?1:0)}</span></button>
      <button onClick={function(e){e.stopPropagation();props.onComments(p);}} className="flex flex-col items-center gap-1"><Ico d={CHAT}/><span className="text-[11px] font-semibold">{props.count?props.count+' ':''}Comentar</span></button>
      {hasVideo && <button onClick={toggleSound} className="flex flex-col items-center gap-1" style={{color:soundOn?'#fbbf24':'#fff'}}><span className="w-11 h-11 rounded-full bg-white/10 backdrop-blur flex items-center justify-center"><Ico d={soundOn?SPK_ON:SPK_OFF} size={22}/></span><span className="text-[11px] font-semibold flex items-center gap-1">{soundOn?<Eq color="#fbbf24"/>:'Sonido'}</span></button>}
      <a href={p.href} onClick={function(e){e.stopPropagation();}} className="flex flex-col items-center gap-1"><Ico d={SHARE}/><span className="text-[11px] font-semibold">Ver</span></a>
    </div>
    <div className="absolute left-4 right-20 bottom-24 z-10 text-white">
      <div className="flex items-center gap-1.5 mb-1.5"><span className="font-bold text-[16px]">{p.name}{p.edad?(', '+p.edad):''}</span>{p.verificado && <span className="inline-flex items-center gap-0.5 text-[10px] font-semibold text-emerald-300 border border-emerald-400/40 bg-emerald-400/10 rounded-full px-1.5 py-0.5">✓ Verificado</span>}</div>
      {p.ciudad && <div className="text-[12px] text-white/70 mb-1.5">📍 {p.ciudad}</div>}
      {p.bio && <p className="text-[14px] leading-snug text-white/95 mb-2 line-clamp-3">{p.bio}</p>}
      {p.roles && p.roles.length>0 && <div className="flex flex-wrap gap-1.5">{p.roles.map(function(r){return <span key={r} className="text-[10px] uppercase tracking-wide px-2 py-0.5 rounded-full border border-amber-300/40 text-amber-200 bg-amber-300/10">{ROLES[r]||r}</span>;})}</div>}
    </div>
    <a href={p.href} onClick={function(e){e.stopPropagation();}} className="absolute left-4 bottom-12 z-10 px-5 py-2 rounded-full text-[13px] font-semibold text-neutral-950" style={{background:'linear-gradient(90deg, '+aura[0]+', '+aura[1]+')'}}>Conocer a {p.name} →</a>
  </section>;
}

function Drawer(props){
  const card=props.card; const [list,setList]=useState(null); const [autor,setAutor]=useState(''); const [texto,setTexto]=useState(''); const [sending,setSending]=useState(false);
  useEffect(()=>{ (async function(){ try{ let q=sb.from('comentarios').select('*').eq('solicitud_id',card.sid).eq('estado','visible').order('created_at',{ascending:false}).limit(200); q = card.videoUrl ? q.eq('video_url',card.videoUrl) : q.is('video_url',null); const res=await q; setList(res.data||[]); }catch(e){ setList([]); } })(); },[]);
  async function send(){ const t=texto.trim(); if(!t){return;} setSending(true); const row={solicitud_id:card.sid, video_url:card.videoUrl||null, autor:(autor.trim()||'Anónimo').slice(0,40), texto:t.slice(0,500)}; try{ const res=await sb.from('comentarios').insert(row).select().single(); if(res.error) throw res.error; setList(function(l){return [res.data].concat(l||[]);}); setTexto(''); props.onPosted(card); }catch(e){ alert('No se pudo enviar el comentario.'); } setSending(false); }
  const n=list?list.length:0;
  return <div className="absolute inset-0 z-40" onClick={props.onClose}><div className="absolute inset-0 bg-black/50"/><div className="absolute bottom-0 inset-x-0 bg-neutral-900 rounded-t-2xl flex flex-col" style={{height:'68%',animation:'upsheet .22s ease-out'}} onClick={function(e){e.stopPropagation();}}>
    <div className="pt-2 pb-1 flex flex-col items-center"><span className="w-10 h-1 rounded-full bg-white/20"/></div>
    <div className="px-4 py-2 text-white font-semibold text-center border-b border-white/10">{n} comentario{n===1?'':'s'} · {card.name}</div>
    <div className="flex-1 overflow-y-auto px-4 py-3 space-y-4 no-sb">
      {list===null && <div className="text-white/50 text-center py-6">Cargando…</div>}
      {list && list.length===0 && <div className="text-white/50 text-center py-8">Sé la primera persona en comentar 💬</div>}
      {list && list.map(function(c){ return <div key={c.id} className="flex gap-3"><div className="w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-neutral-950 text-sm font-bold" style={{background:'linear-gradient(135deg,#f59e0b,#f43f5e)'}}>{(c.autor||'A').slice(0,1).toUpperCase()}</div><div className="min-w-0"><div className="text-amber-200 text-[12px] font-semibold">{c.autor||'Anónimo'}</div><div className="text-white/90 text-[14px] leading-snug break-words">{c.texto}</div></div></div>; })}
    </div>
    <div className="border-t border-white/10 p-3" style={{paddingBottom:'max(16px, env(safe-area-inset-bottom))'}}>
      <input value={autor} onChange={function(e){setAutor(e.target.value);}} placeholder="Tu nombre o alias (opcional)" className="w-full mb-2 bg-white/5 text-white placeholder-white/40 text-[13px] rounded-full px-4 py-2 outline-none"/>
      <div className="flex gap-2"><input value={texto} onChange={function(e){setTexto(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter')send();}} placeholder="Escribí un comentario…" className="flex-1 bg-white/10 text-white placeholder-white/40 text-[14px] rounded-full px-4 py-2.5 outline-none"/><button onClick={send} disabled={sending||!texto.trim()} className="px-4 rounded-full font-semibold text-neutral-950 disabled:opacity-40" style={{background:'linear-gradient(90deg,#f59e0b,#f43f5e)'}}>Enviar</button></div>
    </div>
  </div></div>;
}

function Gate(props){ return <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur flex items-center justify-center p-5"><div className="max-w-sm w-full text-center rounded-3xl border border-white/10 bg-neutral-900 p-8"><img src="assets/logo.svg" className="w-16 h-16 mx-auto mb-4" alt="Aura"/><h2 className="text-white text-2xl font-bold mb-3">Acceso exclusivo +18</h2><p className="text-white/70 text-sm mb-6">Contenido para mayores de edad. Al ingresar confirmás que tenés 18 años o más.</p><button onClick={props.onOk} className="w-full py-3 rounded-full font-semibold text-neutral-950" style={{background:'linear-gradient(90deg,#f59e0b,#f43f5e)'}}>Soy mayor de 18 · Ingresar</button><a href="index.html" className="block mt-3 text-white/50 text-sm">Salir</a></div></div>; }

function ModeBar(props){
  return <div className="absolute top-0 inset-x-0 z-30 pt-3">
    <div className="flex items-center justify-between px-3">
      <a href="index.html" className="text-white/90 text-xl w-8">‹</a>
      <div className="flex bg-black/40 backdrop-blur rounded-full p-1 border border-white/10">
        {MODES.map(function(m){ const on=props.mode===m.k; return <button key={m.k} onClick={function(){props.setMode(m.k);}} className={"px-3.5 py-1.5 rounded-full text-[13px] font-semibold transition "+(on?'text-neutral-950':'text-white/70')} style={on?{background:'linear-gradient(90deg,#f59e0b,#f43f5e)'}:{}}>{m.label}</button>; })}
      </div>
      <div className="flex items-center gap-2 w-8 justify-end"><button onClick={function(){ if(window.auraNotif) window.auraNotif(); }} className="text-white/90 text-[15px]" title="Notificaciones">🔔</button><a href="publicar.html" className="text-white/90 text-[13px] font-semibold">＋</a></div>
    </div>
    <div key={props.mode} className="mx-auto mt-2 w-fit px-4 py-1 rounded-full text-[12px] font-bold text-white/95" style={{background:'rgba(0,0,0,.35)',animation:'modepop .25s ease-out'}}>
      {(MODES.find(function(x){return x.k===props.mode;})||{}).big} <span className="text-white/50 font-normal">· deslizá para cambiar</span>
    </div>
  </div>;
}

function App(){
  const [rows,setRows]=useState(null);
  const [soundOn,setSoundOn]=useState(false);
  const [counts,setCounts]=useState({});
  const [cmt,setCmt]=useState(null);
  const [mode,setMode]=useState(function(){ try{return localStorage.getItem('aura_feed_mode')||'mixto';}catch(e){return 'mixto';} });
  const [ok,setOk]=useState(function(){ try{return sessionStorage.getItem('ea_age_ok')==='1';}catch(e){return false;} });
  const touch=useRef({x:0,y:0});
  function changeMode(k){ setMode(k); try{localStorage.setItem('aura_feed_mode',k);}catch(e){} }
  function onTS(e){ const t=e.touches[0]; touch.current={x:t.clientX,y:t.clientY}; }
  function onTE(e){ if(cmt) return; const t=e.changedTouches[0]; const dx=t.clientX-touch.current.x, dy=t.clientY-touch.current.y; if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ const i=MODES.findIndex(function(m){return m.k===mode;}); let ni = dx<0 ? i+1 : i-1; if(ni<0)ni=0; if(ni>MODES.length-1)ni=MODES.length-1; if(ni!==i) changeMode(MODES[ni].k); } }
  useEffect(()=>{ (async function(){
    try{
      const res=await sb.from('perfiles_publicados').select('id,nombre,bio,ciudad,edad,roles,verificado,videos,fotos,puntos').limit(60);
      setRows(res.data||[]);
      try{ const cr=await sb.from('comentarios').select('solicitud_id,video_url').eq('estado','visible').limit(5000); const m={}; (cr.data||[]).forEach(function(c){ const k=keyOf(c.solicitud_id,c.video_url); m[k]=(m[k]||0)+1; }); setCounts(m); }catch(e){}
    }catch(e){ setRows([]); }
  })(); },[]);
  function onPosted(card){ const k=keyOf(card.sid,card.videoUrl); setCounts(function(c){ const n=Object.assign({},c); n[k]=(n[k]||0)+1; return n; }); }
  if(!ok) return <Gate onOk={function(){ try{sessionStorage.setItem('ea_age_ok','1');}catch(e){} setOk(true); }}/>;

  let items=[];
  if(rows){
    const base=function(r){ return { sid:r.id, name:r.nombre, bio:r.bio, ciudad:r.ciudad, edad:r.edad, roles:r.roles||[], verificado:r.verificado, puntos:r.puntos||0, foto:(Array.isArray(r.fotos)&&r.fotos[0])||null, href:'perfil.html?sid='+r.id }; };
    const vids=[], fotos=[];
    rows.forEach(function(r){ const b=base(r); const vv=Array.isArray(r.videos)?r.videos:[]; vv.forEach(function(v){ vids.push(Object.assign({},b,{video:v,videoUrl:v})); }); if(b.foto) fotos.push(Object.assign({},b,{video:null,videoUrl:null})); });
    vids.sort(function(a,b){return b.puntos-a.puntos;}); fotos.sort(function(a,b){return b.puntos-a.puntos;});
    items = mode==='video'?vids : mode==='foto'?fotos : vids.concat(fotos);
  }

  return <div className="h-full w-full flex justify-center bg-black"><div className="relative h-full w-full max-w-[460px] bg-neutral-950" onTouchStart={onTS} onTouchEnd={onTE}>
    <ModeBar mode={mode} setMode={changeMode}/>
    {rows===null && <div className="h-full flex items-center justify-center text-white/60">Cargando feed…</div>}
    {rows && items.length===0 && <div className="h-full flex flex-col items-center justify-center text-white/60 gap-3 px-8 text-center"><p>{mode==='video'?'Todavía no hay videos.':'No hay publicaciones.'}</p><a href="publicar.html" className="px-5 py-2 rounded-full text-neutral-950 font-semibold" style={{background:'linear-gradient(90deg,#f59e0b,#f43f5e)'}}>Publicá tu perfil</a></div>}
    {rows && items.length>0 && <div key={mode} className="h-full w-full overflow-y-scroll snap-y snap-mandatory no-sb">{items.map(function(p,i){return <div key={p.sid+'|'+(p.videoUrl||'')+i} className="h-full w-full"><Card p={p} aura={AURAS[i%AURAS.length]} soundOn={soundOn} setSoundOn={setSoundOn} count={counts[keyOf(p.sid,p.videoUrl)]} onComments={setCmt}/></div>;})}</div>}
    {cmt && <Drawer card={cmt} onClose={function(){setCmt(null);}} onPosted={onPosted}/>}
  </div></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
(function(){ try{ var src=document.getElementById('app-src').textContent; var out=Babel.transform(src,{presets:[['react',{runtime:'classic'}]]}).code; var sc=document.createElement('script'); sc.textContent=out; document.body.appendChild(sc); }catch(e){ console.error(e); document.getElementById('root').innerHTML='<div style="color:#fff;padding:24px">No se pudo cargar: '+(e&&e.message||e)+'</div>'; } })();
</script>
<script src="js/pwa.js?v=2" defer></script>
</body>
</html>
