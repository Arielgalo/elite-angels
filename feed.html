<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Feed · Aura Experience</title>
<meta name="description" content="Descubrí perfiles reales en video: presencia humana a demanda. Scrolleá, conocé y conectá.">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;background:#0a0a0c;font-family:'Helvetica Neue',Helvetica,Arial,'Inter',sans-serif;overscroll-behavior:none;}
  #root{height:100dvh;}
  .no-sb::-webkit-scrollbar{display:none;}
  .no-sb{-ms-overflow-style:none;scrollbar-width:none;}
  @keyframes auraspin{to{transform:rotate(360deg)}}
  @keyframes kb{0%{transform:scale(1)}100%{transform:scale(1.12)}}
  @keyframes eq{0%,100%{height:20%}50%{height:100%}}
  @keyframes pulseSound{0%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}100%{transform:scale(1);opacity:.9}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect, useRef } = React;
const SUPA_URL='https://fsjrimmurtnrorqhnbwu.supabase.co';
const SUPA_KEY='sb_publishable_2lWllWfVLWsPnnko4TEa4Q_2sx0kdI4';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

const AURAS=[['#f59e0b','#f43f5e','#a855f7'],['#22d3ee','#3b82f6','#8b5cf6'],['#34d399','#10b981','#f59e0b'],['#e879f9','#d946ef','#f43f5e'],['#fbbf24','#f97316','#ef4444'],['#60a5fa','#818cf8','#c084fc']];
const ROLES={citas:'Citas & Compañía',amigos:'Amigos & Salidas',eventos:'Eventos, Roles & Presencia'};

function Ico({d,fill,size}){return <svg width={size||27} height={size||27} viewBox="0 0 24 24" fill={fill||'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;}
const HEART="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z";
const CHAT="M21 11.5a8.4 8.4 0 0 1-11.9 7.6L3 21l1.9-6A8.4 8.4 0 1 1 21 11.5z";
const SHARE="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7 M16 6l-4-4-4 4 M12 2v13";
const SPK_ON="M11 5 6 9H2v6h4l5 4V5z M15.5 8.5a5 5 0 0 1 0 7 M19 5a9 9 0 0 1 0 14";
const SPK_OFF="M11 5 6 9H2v6h4l5 4V5z M22 9l-6 6 M16 9l6 6";

function Eq({color}){
  return (
    <div className="flex items-end gap-0.5 h-3.5" title="sonido activo">
      {[0,1,2,3].map(i=>(
        <span key={i} className="w-0.5 rounded-full" style={{background:color,height:'100%',animation:`eq ${0.6+i*0.12}s ease-in-out ${i*0.1}s infinite`}}/>
      ))}
    </div>
  );
}

function AuraRing({colors,size,active}){
  return (
    <div className="relative shrink-0" style={{width:size,height:size}}>
      <div className="absolute rounded-full" style={{inset:0,background:`conic-gradient(from 0deg, ${colors[0]}, ${colors[1]}, ${colors[2]}, ${colors[0]})`,animation:`auraspin ${active?3.5:9}s linear infinite`,boxShadow:active?`0 0 20px 3px ${colors[1]}99`:'none'}}/>
      <div className="absolute rounded-full overflow-hidden bg-neutral-900" style={{inset:3}}>
        {colors.img
          ? <img src={colors.img} className="w-full h-full object-cover" alt=""/>
          : <div className="w-full h-full" style={{background:`radial-gradient(circle at 30% 25%, ${colors[0]}66, transparent 60%), radial-gradient(circle at 70% 80%, ${colors[2]}66, transparent 60%)`}}/>}
      </div>
    </div>
  );
}

function Card({p, aura, soundOn, setSoundOn}){
  const ref=useRef(null), vidRef=useRef(null);
  const [active,setActive]=useState(false);
  const [paused,setPaused]=useState(false);
  const [liked,setLiked]=useState(false);

  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(([e])=>{
      const vis=e.intersectionRatio>0.6; setActive(vis);
      const v=vidRef.current;
      if(v){
        if(vis){ v.muted=!soundOn; v.volume=1; v.play().then(()=>setPaused(false)).catch(()=>{}); }
        else { v.pause(); v.muted=true; }
      }
    },{threshold:[0,0.6,1]});
    io.observe(el); return ()=>io.disconnect();
  },[soundOn]);

  // aplicar sonido al video activo cuando cambia el estado global
  useEffect(()=>{
    const v=vidRef.current; if(v&&active){ v.muted=!soundOn; v.volume=1; }
  },[soundOn,active]);

  function toggleSound(e){
    if(e) e.stopPropagation();
    const ns=!soundOn; setSoundOn(ns);
    const v=vidRef.current;
    if(v){ v.muted=!ns; v.volume=1; if(ns){ v.play().then(()=>setPaused(false)).catch(()=>{}); } }
  }
  function onMediaTap(){
    if(!soundOn && p.video){ toggleSound(); return; }        // primer toque: activa sonido
    const v=vidRef.current; if(!v) return;
    if(v.paused){ v.play(); setPaused(false); } else { v.pause(); setPaused(true); }
  }

  const avatarColors=Object.assign([...aura],{img:p.foto});
  const hasVideo=!!p.video;

  return (
    <section ref={ref} className="relative h-full w-full shrink-0 snap-start snap-always overflow-hidden bg-neutral-950" onClick={onMediaTap}>
      {hasVideo
        ? <video ref={vidRef} src={p.video} poster={p.foto||undefined} loop muted playsInline preload="auto" className="absolute inset-0 w-full h-full object-cover"/>
        : (p.foto
            ? <img src={p.foto} alt={p.name} className="absolute inset-0 w-full h-full object-cover" style={{animation:active?'kb 12s ease-out forwards':'none'}}/>
            : <div className="absolute inset-0" style={{background:`linear-gradient(160deg, ${aura[0]}33, #0a0a0c 70%)`}}/>) }
      <div className="absolute inset-0" style={{background:'linear-gradient(to top, rgba(0,0,0,.82) 4%, rgba(0,0,0,0) 42%, rgba(0,0,0,.25))'}}/>

      {/* pausa */}
      {hasVideo && paused && <div className="absolute inset-0 flex items-center justify-center pointer-events-none"><span className="w-16 h-16 rounded-full bg-black/40 backdrop-blur flex items-center justify-center text-white"><Ico d="M8 5v14l11-7z" fill="#fff" size={30}/></span></div>}

      {/* aviso: tocá para activar el sonido */}
      {hasVideo && active && !soundOn &&
        <button onClick={toggleSound} className="absolute top-16 left-1/2 -translate-x-1/2 z-20 flex items-center gap-2 px-4 py-2 rounded-full text-neutral-950 text-[13px] font-semibold" style={{background:'linear-gradient(90deg,#f59e0b,#f43f5e)',animation:'pulseSound 1.6s ease-in-out infinite'}}>
          <Ico d={SPK_OFF} size={18}/> Tocá para activar el sonido
        </button>}

      {!hasVideo && <div className="absolute left-1/2 -translate-x-1/2 top-4 text-[10px] tracking-widest uppercase text-white/50">Foto · sumá tu video</div>}

      {/* rail acciones */}
      <div className="absolute right-2.5 bottom-32 flex flex-col items-center gap-5 z-10 text-white">
        <div className="relative flex flex-col items-center">
          <AuraRing colors={avatarColors} size={54} active={active}/>
          <span className="w-5 h-5 -mt-2 rounded-full flex items-center justify-center text-neutral-950 text-sm font-bold" style={{background:aura[1]}}>+</span>
        </div>
        <button onClick={(e)=>{e.stopPropagation();setLiked(v=>!v);}} className="flex flex-col items-center gap-1 active:scale-90 transition" style={{color:liked?'#f43f5e':'#fff'}}><Ico d={HEART} fill={liked?'#f43f5e':'none'}/><span className="text-[11px] font-semibold">{(p.puntos||0)+(liked?1:0)}</span></button>
        <button onClick={(e)=>e.stopPropagation()} className="flex flex-col items-center gap-1 active:scale-90 transition"><Ico d={CHAT}/><span className="text-[11px] font-semibold">Chat</span></button>
        {hasVideo &&
          <button onClick={toggleSound} className="flex flex-col items-center gap-1 active:scale-90 transition" style={{color:soundOn?'#fbbf24':'#fff'}}>
            <span className="w-11 h-11 rounded-full bg-white/10 backdrop-blur flex items-center justify-center relative">
              <Ico d={soundOn?SPK_ON:SPK_OFF} size={22}/>
            </span>
            <span className="text-[11px] font-semibold flex items-center gap-1">{soundOn?<Eq color="#fbbf24"/>:'Sonido'}</span>
          </button>}
        <a href={p.href} onClick={(e)=>e.stopPropagation()} className="flex flex-col items-center gap-1 active:scale-90 transition"><Ico d={SHARE}/><span className="text-[11px] font-semibold">Ver</span></a>
      </div>

      {/* info */}
      <div className="absolute left-4 right-20 bottom-24 z-10 text-white">
        <div className="flex items-center gap-1.5 mb-1.5">
          <span className="font-bold text-[16px]">{p.name}{p.edad?`, ${p.edad}`:''}</span>
          {p.verificado && <span className="inline-flex items-center gap-0.5 text-[10px] font-semibold text-emerald-300 border border-emerald-400/40 bg-emerald-400/10 rounded-full px-1.5 py-0.5">✓ Verificado</span>}
        </div>
        {p.ciudad && <div className="text-[12px] text-white/70 mb-1.5">📍 {p.ciudad}</div>}
        {p.bio && <p className="text-[14px] leading-snug text-white/95 mb-2 line-clamp-3">{p.bio}</p>}
        {p.roles && p.roles.length>0 && <div className="flex flex-wrap gap-1.5">{p.roles.map(r=><span key={r} className="text-[10px] uppercase tracking-wide px-2 py-0.5 rounded-full border border-amber-300/40 text-amber-200 bg-amber-300/10">{ROLES[r]||r}</span>)}</div>}
      </div>

      <a href={p.href} onClick={(e)=>e.stopPropagation()} className="absolute left-4 bottom-12 z-10 px-5 py-2 rounded-full text-[13px] font-semibold text-neutral-950" style={{background:`linear-gradient(90deg, ${aura[0]}, ${aura[1]})`}}>Conocer a {p.name} →</a>
    </section>
  );
}

function Gate({onOk}){
  return (
    <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur flex items-center justify-center p-5">
      <div className="max-w-sm w-full text-center rounded-3xl border border-white/10 bg-neutral-900 p-8">
        <img src="assets/logo.svg" className="w-16 h-16 mx-auto mb-4" alt="Aura"/>
        <h2 className="text-white text-2xl font-bold mb-3">Acceso exclusivo +18</h2>
        <p className="text-white/70 text-sm mb-6">Contenido para mayores de edad. Al ingresar confirmás que tenés 18 años o más y aceptás los términos y la política de privacidad.</p>
        <button onClick={onOk} className="w-full py-3 rounded-full font-semibold text-neutral-950"
