<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>if(location.hostname.indexOf("netlify.app")>-1)location.replace("https://auraexperience.com.ar"+location.pathname+location.search+location.hash);</script>
<title>Currículum · Aura Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a24b;--goldb:#e6c983;--ink:#1a1a1e;--soft:#5a5a63;--line:#e6e2da;--bg:#f4f1ea}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',Helvetica,Arial,sans-serif;background:#20202a;color:var(--ink);padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.bar{width:100%;max-width:820px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;background:#15151c;padding:12px;border-radius:14px;position:sticky;top:8px;z-index:10}
.bar .sp{flex:1;min-width:8px}
.bar button{font-family:inherit;border:1px solid #3a3a44;background:#23232c;color:#eee;padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.bar button.on{background:linear-gradient(90deg,#c9a24b,#e6c983);color:#1a1a1e;border-color:transparent}
.bar button.dl{background:linear-gradient(90deg,#f59e0b,#f43f5e);color:#0a0a0c;border-color:transparent}
.bar a.back{color:#9a9aa6;font-size:13px;text-decoration:none;padding:6px 10px}
.page{width:820px;max-width:96vw;min-height:1000px;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden}
.cv{display:flex;min-height:1000px}
.hidden{display:none!important}
/* ---------- comunes de secciones ---------- */
.chip{display:inline-block;font-size:12.5px;padding:3px 10px;border-radius:999px;margin:0 5px 6px 0;background:rgba(201,162,75,.14);color:#8a6d24;border:1px solid rgba(201,162,75,.35)}
.sec h3{font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;color:var(--gold)}
.sec{margin-bottom:20px}
.sec p{color:var(--soft);line-height:1.65;font-size:14px}
.li{color:var(--soft);font-size:14px;line-height:1.6;padding-left:14px;position:relative;margin-bottom:5px}
.li:before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.name{font-family:'Cormorant Garamond',serif;line-height:1.05}
.verifpill{display:inline-block;font-size:11px;font-weight:600;color:#2e7d55;border:1px solid #7bc79b;background:#eafaf0;border-radius:999px;padding:2px 9px;margin-top:6px}

/* ============ ESTILO 1 · EJECUTIVO ============ */
.t1 .cv{flex-direction:column;padding:56px 60px}
.t1 .head{text-align:center;border-bottom:2px solid var(--ink);padding-bottom:24px;margin-bottom:26px}
.t1 .photo{width:132px;height:132px;border-radius:50%;object-fit:cover;margin:0 auto 16px;border:1px solid var(--line)}
.t1 .name{font-size:44px;font-weight:700;color:var(--ink)}
.t1 .role{font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:6px}
.t1 .meta{color:var(--soft);font-size:14px;margin-top:8px}
.t1 .cols{display:grid;grid-template-columns:1fr 1fr;gap:34px}
.t1 .sec h3{border-bottom:1px solid var(--line);padding-bottom:5px}

/* ============ ESTILO 2 · MODERNO 2 COLUMNAS ============ */
.t2 .aside{width:290px;background:#1a1a22;color:#e8e8ee;padding:44px 26px;flex-shrink:0}
.t2 .aside .photo{width:150px;height:150px;border-radius:12px;object-fit:cover;margin:0 auto 18px;display:block;border:3px solid rgba(201,162,75,.5)}
.t2 .aside .name{font-size:30px;font-weight:700;color:#fff;text-align:center}
.t2 .aside .role{text-align:center;color:var(--goldb);font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;margin:6px 0 20px}
.t2 .aside h3{color:var(--goldb)}
.t2 .aside p,.t2 .aside .li{color:#c3c3cf}
.t2 .aside .li:before{background:var(--goldb)}
.t2 .aside .chip{background:rgba(230,201,131,.14);color:var(--goldb);border-color:rgba(230,201,131,.3)}
.t2 .main{flex:1;padding:46px 44px}
.t2 .main .name{display:none}
.t2 .main .sec h3{border-bottom:1px solid var(--line);padding-bottom:5px}

/* ============ ESTILO 3 · PREMIUM AURA ============ */
.t3 .page{background:#0e0c12}
.t3 .cv{flex-direction:column;background:radial-gradient(120% 60% at 50% 0%,rgba(201,162,75,.18),transparent 60%),#0e0c12;color:#ece6dc;padding:0}
.t3 .banner{position:relative;text-align:center;padding:54px 40px 30px}
.t3 .photo{width:150px;height:150px;border-radius:50%;object-fit:cover;margin:0 auto 18px;border:3px solid var(--gold);box-shadow:0 0 30px rgba(201,162,75,.4)}
.t3 .name{font-size:46px;font-weight:700;color:#fff}
.t3 .role{font-size:14px;letter-spacing:.24em;text-transform:uppercase;color:var(--goldb);margin-top:8px}
.t3 .meta{color:#b9b3a8;font-size:14px;margin-top:8px}
.t3 .body{padding:20px 54px 60px;display:grid;grid-template-columns:1fr 1fr;gap:34px}
.t3 .sec h3{color:var(--goldb);border-bottom:1px solid rgba(230,201,131,.25);padding-bottom:5px}
.t3 .sec p,.t3 .li{color:#c9c3b8}
.t3 .chip{background:rgba(230,201,131,.12);color:var(--goldb);border-color:rgba(230,201,131,.3)}
.t3 .full{grid-column:1/-1}

@media print{
  body{background:#fff;padding:0}
  .bar{display:none}
  .page{box-shadow:none;width:100%;max-width:100%}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:0;size:A4}
}
</style>
</head>
<body class="t1">
  <div class="bar" id="bar">
    <a class="back" href="#" id="back">← Volver</a>
    <div class="sp"></div>
    <button data-e="1" class="on">Ejecutivo</button>
    <button data-e="2">Moderno</button>
    <button data-e="3">Premium</button>
    <div class="sp"></div>
    <button class="dl" id="dl">⬇ Descargar PDF</button>
  </div>
  <div class="page" id="page"><div class="cv" id="cv"><p style="padding:40px;color:#888">Cargando currículum…</p></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var URL='https://fsjrimmurtnrorqhnbwu.supabase.co', KEY='sb_publishable_2lWllWfVLWsPnnko4TEa4Q_2sx0kdI4';
  var qs=new URLSearchParams(location.search); var sid=qs.get('sid'); var estilo=qs.get('estilo')||'1';
  var esc=function(x){return (x==null?'':String(x)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});};
  function chips(v){ if(!v) return ''; return String(v).split(/[,\n]/).map(function(t){return t.trim();}).filter(Boolean).map(function(t){return '<span class="chip">'+esc(t)+'</span>';}).join(''); }
  function lines(v){ if(!v) return ''; return String(v).split(/\n/).map(function(t){return t.trim();}).filter(Boolean).map(function(t){return '<div class="li">'+esc(t)+'</div>';}).join(''); }
  function setEstilo(e){ estilo=e; document.body.className='t'+e; [].forEach.call(document.querySelectorAll('.bar button[data-e]'),function(b){b.classList.toggle('on',b.dataset.e===e);}); var u=new URLSearchParams(location.search); u.set('estilo',e); if(sid)u.set('sid',sid); history.replaceState(null,'','cv.html?'+u.toString()); render(); }
  document.getElementById('back').addEventListener('click',function(ev){ev.preventDefault(); if(sid) location.href='perfil.html?sid='+sid; else history.back();});
  [].forEach.call(document.querySelectorAll('.bar button[data-e]'),function(b){ b.addEventListener('click',function(){setEstilo(b.dataset.e);}); });
  document.getElementById('dl').addEventListener('click',function(){ window.print(); });

  var P=null;
  function block(title,inner){ if(!inner) return ''; return '<div class="sec"><h3>'+title+'</h3>'+inner+'</div>'; }
  function render(){
    if(!P){ return; }
    var p=P;
    var foto=(p.fotos&&p.fotos[0])||'';
    var photoTag= foto? '<img class="photo" src="'+esc(foto)+'" alt="">' : '<div class="photo" style="background:linear-gradient(135deg,#c9a24b,#e6c983)"></div>';
    var role=[].concat(p.roles||[]).length? ({citas:'Pactos & Acuerdos',amigos:'Amigos & Salidas',eventos:'Eventos & Presencia'}) : null;
    var roleTxt=(p.roles||[]).map(function(r){return ({citas:'Pactos & Acuerdos',amigos:'Amigos & Salidas',eventos:'Eventos & Presencia'})[r]||r;}).join(' · ') || (p.estilo? String(p.estilo).split(',')[0].trim():'Perfil Aura');
    var meta=[ (p.edad?p.edad+' años':''), [p.ciudad,p.provincia].filter(Boolean).join(', ') ].filter(Boolean).join('  ·  ');
    var verif= p.verificado? '<div class="verifpill">✓ Identidad verificada</div>':'';
    var edu=''; if(p.nivel_educativo||p.estudio){ var e1=[p.nivel_educativo, p.edu_estado?('· '+p.edu_estado):''].filter(Boolean).join(' '); edu='<p>'+esc(e1)+(p.estudio?'<br><strong style="color:inherit">'+esc(p.estudio)+'</strong>':'')+'</p>'; }
    var cursos=lines(p.cursos);
    var about=p.bio? '<p>'+esc(p.bio)+'</p>':'';
    var langs=chips(p.idiomas);
    var skills=chips(p.habilidades);
    var hobbies=chips(p.hobbies);
    var rutinas= p.rutinas? '<p>'+esc(p.rutinas)+'</p>':'';
    var gustos=chips(p.otros_gustos);
    var comeSi=chips(p.comidas_gusta); var comeNo=chips(p.comidas_rechaza); var negocio=p.negocio?'<p>'+esc(p.negocio)+'</p>':'';

    var head='<div class="head"><div class="name-wrap">'+photoTag+'<div class="name">'+esc(p.nombre||'Perfil')+'</div><div class="role">'+esc(roleTxt)+'</div><div class="meta">'+esc(meta)+'</div>'+verif+'</div></div>';

    var cv=document.getElementById('cv'); cv.className='cv';
    if(estilo==='2'){
      cv.innerHTML=''+
        '<div class="aside">'+photoTag+'<div class="name">'+esc(p.nombre||'Perfil')+'</div><div class="role">'+esc(roleTxt)+'</div>'+
          (meta?'<div class="sec"><h3>Datos</h3><p>'+esc(meta)+'</p>'+verif+'</div>':'')+
          block('Idiomas',langs)+ block('Habilidades',skills)+ block('Hobbies',hobbies)+
        '</div>'+
        '<div class="main">'+
          block('Sobre mí',about)+ block('Formación',edu)+ block('Cursos y capacitaciones',cursos)+
          block('Rutinas',rutinas)+ block('Otros gustos',gustos)+ block('Comidas que disfruta',comeSi)+ block('No consume',comeNo)+ block('Negocio / oficio',negocio)+
        '</div>';
    } else if(estilo==='3'){
      cv.innerHTML=''+
        '<div class="banner">'+photoTag+'<div class="name">'+esc(p.nombre||'Perfil')+'</div><div class="role">'+esc(roleTxt)+'</div><div class="meta">'+esc(meta)+'</div>'+verif+'</div>'+
        '<div class="body">'+
          (about?'<div class="sec full"><h3>Sobre mí</h3>'+about+'</div>':'')+
          block('Formación',edu)+ block('Cursos y capacitaciones',cursos)+
          block('Idiomas',langs)+ block('Habilidades',skills)+
          block('Hobbies',hobbies)+ block('Otros gustos',gustos)+
          (rutinas?'<div class="sec full"><h3>Rutinas</h3>'+rutinas+'</div>':'')+ block('Comidas que disfruta',comeSi)+ block('No consume',comeNo)+ (negocio?'<div class="sec full"><h3>Negocio / oficio</h3>'+negocio+'</div>':'')+
        '</div>';
    } else {
      cv.innerHTML=head+
        '<div class="cols">'+
          '<div>'+block('Sobre mí',about)+block('Formación',edu)+block('Cursos y capacitaciones',cursos)+'</div>'+
          '<div>'+block('Idiomas',langs)+block('Habilidades',skills)+block('Hobbies',hobbies)+block('Rutinas',rutinas)+block('Otros gustos',gustos)+block('Comidas que disfruta',comeSi)+block('No consume',comeNo)+block('Negocio / oficio',negocio)+'</div>'+
        '</div>';
    }
  }

  if(!sid){ document.getElementById('cv').innerHTML='<p style="padding:40px;color:#888">Falta el perfil (?sid=). Abrí el CV desde un perfil.</p>'; return; }
  var sb=window.supabase.createClient(URL,KEY);
  sb.from('perfiles_publicados').select('*').eq('id',sid).maybeSingle().then(function(r){
    if(r.error||!r.data){ document.getElementById('cv').innerHTML='<p style="padding:40px;color:#888">No se encontró el perfil.</p>'; return; }
    P=r.data; document.title='CV · '+(P.nombre||'Aura'); setEstilo(estilo);
  });
})();
</script>
</body>
</html>
